name: colorcraft_paints
description: "ColorCraft Paints — Premium Paint Shop App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  fl_chart: ^0.70.2
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  uuid: ^4.5.1
  intl: ^0.19.0
  firebase_core: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/Asian/
    - assets/images/Asian/Waterproofing/
    - assets/images/Asian/Interior/
    - assets/images/Asian/Exterior/
    - assets/images/Berger/
    - assets/images/Berger/Exterior/
    - assets/images/Berger/Interior/
    - assets/images/Berger/Primers/
    - assets/images/Nerolac/
    - assets/images/Opus/
